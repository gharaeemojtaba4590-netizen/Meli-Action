```yaml
name: دانلودر لینک مستقیم

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct File URL'
        required: true
        type: string

      zip_password:
        description: 'Password for archive (leave empty for no password)'
        required: false
        type: string
        default: ''

      max_part_mb:
        description: 'Maximum size per part (MB) - 0 = auto (1800MB)'
        required: false
        type: string
        default: '1800'

      upload_method:
        description: '📤 Upload Method'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ Release Tag Name (only for Release method)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  direct-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl

      - name: 📥 Download File
        id: download
        run: |
          mkdir -p temp_dl
          FILENAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d'?' -f1 | sed 's/[^a-zA-Z0-9._\-\(\) ]/_/g')
          echo "Downloading: $FILENAME"
          curl -L --fail --retry 3 --progress-bar \
               -o "temp_dl/$FILENAME" \
               "${{ github.event.inputs.file_url }}"

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "filepath=temp_dl/$FILENAME" >> $GITHUB_OUTPUT

      - name: ✂️ Create Split Archive
        id: archive
        run: |
          FILEPATH="${{ steps.download.outputs.filepath }}"
          PASS="${{ github.event.inputs.zip_password }}"
          THRESH_MB=${{ github.event.inputs.max_part_mb }}

          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          BASENAME=$(basename "$FILEPATH")

          cd temp_dl

          ARCHIVE_BASE="${BASENAME%.*}_$(date +%Y%m%d_%H%M%S)"

          echo "Creating archive (~${THRESH_MB}MB parts)..."

          if [ -n "$PASS" ]; then
            7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          else
            7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$BASENAME"
          fi

          # Rename if single part
          if [ -f "${ARCHIVE_BASE}.7z.001" ] && [ ! -f "${ARCHIVE_BASE}.7z.002" ]; then
            mv "${ARCHIVE_BASE}.7z.001" "${ARCHIVE_BASE}.7z"
          fi

          echo "archive_name=${ARCHIVE_BASE}.7z" >> $GITHUB_OUTPUT

          cd ..

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads

          mv temp_dl/* downloads/ 2>/dev/null || true

          git add downloads/
          git commit -m "⬇️ Direct Download: ${{ steps.download.outputs.filename }} [skip ci]" || echo "Nothing to commit"
          git push

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('direct-{0}', github.run_number) }}
          name: ${{ format('Direct Download - {0}', steps.download.outputs.filename) }}
          body: |
            **📦 Direct File Download**

            **File Name:** ${{ steps.download.outputs.filename }}

            **Original URL:** ${{ github.event.inputs.file_url }}

            **Downloaded on:** ${{ steps.get_date.outputs.date }}
            **Archive Type:** 7z (Split)

            ---
            Powered by Meli-Action ⚡
          files: |
            temp_dl/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf temp_dl 2>/dev/null || true
```
